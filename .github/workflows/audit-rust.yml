name: Continuous Integration - Audit (Rust)

on:
  push:
    paths:
      - ".github/workflows/audit-rust.yml"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    paths:
      - ".github/workflows/audit-rust.yml"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  audit-rust:
    permissions:
      contents: read
      checks: write
    uses: jaudiger/reusable-workflows/.github/workflows/audit-rust.yml@04ca9c1ba0702419876c79c5c5bcc8b44bfb223e
