name: Continuous Deployment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: jaudiger/reusable-workflows/.github/workflows/deploy-rust-cloudflare-pages.yml@8104be620dc861697cf02b53d8fe3119edece0b5
    secrets: inherit
