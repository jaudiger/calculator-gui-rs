name: Continuous Deployment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: jaudiger/reusable-workflows/.github/workflows/deploy-rust-cloudflare-pages.yml@16364121c482897e29680101ea22b8a3ea472c25
    secrets: inherit
